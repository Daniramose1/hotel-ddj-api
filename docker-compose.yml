version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: mysql-hotel
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: 0261
      MYSQL_DATABASE: hotel_ddj_db

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    command:
      - --default-authentication-plugin=mysql_native_password
      - --host-cache-size=0

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p0261 --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

    networks:
      - redhotel


  hotel-api:
    build: .
    container_name: hotel-api
    restart: unless-stopped

    ports:
      - "8081:8081"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hotel_ddj_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 0261

    depends_on:
      mysql:
        condition: service_healthy

    networks:
      - redhotel

volumes:
  mysql_data:

networks:
  redhotel:
    driver: bridge